<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pineapple Party</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 0; right: 0;
    text-align: center; color: #ccc; font-family: system-ui, sans-serif;
    font-size: 14px; pointer-events: none; user-select: none;
  }

  /* Right panel */
  #panel {
    position: absolute; top: 40px; right: 16px; width: 220px;
    background: rgba(10, 10, 30, 0.85); border-radius: 10px;
    padding: 16px; font-family: system-ui, sans-serif;
    color: #ddd; font-size: 13px; backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    max-height: calc(100vh - 120px); overflow-y: auto;
  }
  #panel h3 {
    margin: 0 0 12px 0; font-size: 14px; color: #fff;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  #modelToggle {
    display: flex; gap: 4px; margin-bottom: 14px;
  }
  .modelBtn {
    flex: 1; padding: 8px 0; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
    color: #ccc; cursor: pointer; font-size: 18px; text-align: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .modelBtn:hover { background: rgba(255,255,255,0.12); }
  .modelBtn.active { background: rgba(218,165,32,0.3); border-color: #daa520; }
  .control { margin-bottom: 10px; }
  .control label {
    display: flex; justify-content: space-between; margin-bottom: 3px;
    font-size: 12px;
  }
  .control label span.val { color: #daa520; font-variant-numeric: tabular-nums; }
  .control input[type=range] {
    width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
  }
  .control input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #daa520; cursor: pointer;
    border: 2px solid rgba(0,0,0,0.3);
  }
  .panelBtn {
    width: 100%; margin-top: 6px; padding: 7px 0;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; color: #ccc; cursor: pointer; font-size: 12px;
    font-family: system-ui, sans-serif; letter-spacing: 0.3px;
  }
  .panelBtn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* Left toolbar */
  #toolbar {
    position: absolute; top: 40px; left: 16px;
    background: rgba(10, 10, 30, 0.85); border-radius: 10px;
    padding: 10px; font-family: system-ui, sans-serif;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 6px;
  }
  .toolBtn {
    width: 44px; height: 44px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .toolBtn:hover { background: rgba(255,255,255,0.12); }
  .toolBtn.active { background: rgba(218,165,32,0.3); border-color: #daa520; color: #fff; }
  #toolbar label {
    color: #999; font-size: 10px; text-align: center; margin-top: 2px;
  }
  #toolbar input[type=range] {
    width: 44px; height: 4px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
  }
  #toolbar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: #daa520; cursor: pointer;
  }

  /* Bottom timeline */
  #timeline {
    position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
    background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 8px; padding: 0 16px;
    font-family: system-ui, sans-serif; color: #ccc; font-size: 13px;
    user-select: none;
  }
  .tlBtn {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .tlBtn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .tlBtn.active { background: rgba(218,165,32,0.3); border-color: #daa520; }
  #scrub {
    flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
  }
  #scrub::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #daa520; cursor: pointer;
    border: 2px solid rgba(0,0,0,0.3);
  }
  #timeDisplay { font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; font-size: 12px; }
  #speedDisplay { font-variant-numeric: tabular-nums; min-width: 36px; text-align: center; font-size: 11px; color: #daa520; }
</style>
</head>
<body>
<div id="info">Drag to rotate &middot; Scroll to zoom</div>

<!-- Left toolbar -->

  <button class="toolBtn" id="toolPinch" title="Pinch">&#129295;</button>

<!-- Right panel -->
<div id="panel">
  <div id="modelToggle">

    <label>Roll <span class="val" id="rollVal">0</span></label>

  <div class="control">
    <label>Smush <span class="val" id="smushVal">0</span></label>
    <input type="range" id="smush" min="-100" max="100" value="0">
  </div>
  <div class="control">
    <label>Galumph <span class="val" id="galumphVal">0</span></label>
    <input type="range" id="galumph" min="0" max="100" value="0">
  </div>
  <div class="control">
    <label>Throb <span class="val" id="throbVal">0</span></label>
    <input type="range" id="throb" min="0" max="100" value="0">
  </div>
  <div class="control">
    <label>Wibble <span class="val" id="wibbleVal">0</span></label>
    <input type="range" id="wibble" min="0" max="100" value="0">
  </div>
  <div class="control">

    <label>Melt <span class="val" id="meltVal">0</span></label>

  <div class="control">

  <div class="control">

  <button class="panelBtn" id="exportBtn">Export SCAD</button>
  <button class="panelBtn" id="resetBtn">Reset All</button>
</div>

<!-- Bottom timeline -->
<div id="timeline">
  <button class="tlBtn" id="tlRew" title="Rewind">&#9194;</button>
  <button class="tlBtn" id="tlPlay" title="Play/Pause">&#9654;</button>
  <button class="tlBtn" id="tlFF" title="Fast Forward">&#9193;</button>
  <input type="range" id="scrub" min="0" max="6000" value="0" step="1">
  <span id="timeDisplay">0.00s</span>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =====================================================
// SCENE SETUP
// =====================================================
const scene = new THREE.Scene();
const bgColor = new THREE.Color(0x1a1a2e);
scene.background = bgColor.clone();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 1000);
camera.position.set(80, 60, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.target.set(0, 40, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const dir1 = new THREE.DirectionalLight(0xffffff, 1.0);
dir1.position.set(50, 80, 60);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0x8888ff, 0.3);
dir2.position.set(-40, 20, -30);
scene.add(dir2);
const discoLight = new THREE.PointLight(0xff0000, 0, 200);
discoLight.position.set(60, 60, 0);
scene.add(discoLight);

const sulphurColor = new THREE.Color(0xeeee44);

const gridHelper = new THREE.GridHelper(200, 20, 0x333355, 0x222244);
scene.add(gridHelper);

// =====================================================
// SHARED: LEAF GEOMETRY BUILDER
// =====================================================
function createLeafGeo(leafW, leafTh, leafLen) {
  const steps = 12;
  const positions = [], normals = [], indices = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const w = (leafW / 2) * (1 - t * 0.67);
    const th = (leafTh / 2) * (1 - t * 0.34);
    const y = t * leafLen;
    const curve = -t * t * 8;
    const baseIdx = i * 4;
    positions.push(w, y, th + curve, -w, y, th + curve, -w, y, -th + curve, w, y, -th + curve);
    normals.push(0.5, 0, 0.5, -0.5, 0, 0.5, -0.5, 0, -0.5, 0.5, 0, -0.5);
    if (i < steps) {
      const n = baseIdx + 4;
      indices.push(baseIdx, n, n+1, baseIdx, n+1, baseIdx+1);
      indices.push(baseIdx+1, n+1, n+2, baseIdx+1, n+2, baseIdx+2);
      indices.push(baseIdx+2, n+2, n+3, baseIdx+2, n+3, baseIdx+3);
      indices.push(baseIdx+3, n+3, n, baseIdx+3, n, baseIdx);
    }
  }
  const topBase = steps * 4;
  indices.push(topBase, topBase+1, topBase+2, topBase, topBase+2, topBase+3);
  indices.push(0, 2, 1, 0, 3, 2);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// =====================================================
// SCAD PARAMETER PARSER
// =====================================================
function parseScadParams(text) {
  const p = {};
  for (const line of text.split('\n')) {
    const m = line.match(/^(\w+)\s*=\s*(.+?)\s*;\s*(?:\/\/.*)?$/);
    if (!m) continue;
    const key = m[1], raw = m[2].trim();
    if (raw.startsWith('"')) p[key] = raw.slice(1, -1);
    else if (raw.startsWith('[')) p[key] = JSON.parse(raw);
    else if (raw === 'true') p[key] = true;
    else if (raw === 'false') p[key] = false;
    else p[key] = parseFloat(raw);
  }
  return p;
}

// =====================================================
// GENERIC FRUIT MODEL BUILDER
// =====================================================
function buildFruitFromParams(p) {
  const BH = p.body_height, BR = p.body_radius;
  const BS = p.bump_size, BROWS = p.bump_rows, BPROW = p.bumps_per_row;

  // Materials
  const bodyMat = new THREE.MeshStandardMaterial({ color: parseInt(p.body_color), roughness: p.body_roughness, metalness: p.body_metalness });
  const bumpMat = new THREE.MeshStandardMaterial({ color: parseInt(p.bump_color), roughness: p.bump_roughness, metalness: p.bump_metalness });
  const leafMat = new THREE.MeshStandardMaterial({ color: parseInt(p.leaf_color), roughness: p.leaf_roughness, metalness: p.leaf_metalness, side: THREE.DoubleSide });

  const group = new THREE.Group();

  // --- Body ---
  let bodyGeo, body, defaultBodyScaleY = 1;

  if (p.body_type === 'sphere') {
    bodyGeo = new THREE.SphereGeometry(BR, 48, 32);
    body = new THREE.Mesh(bodyGeo, bodyMat);
    const yScale = p.body_y_scale || BH / (2 * BR);
    body.scale.set(1, yScale, 1);
    body.position.y = BH / 2;
    defaultBodyScaleY = yScale;
  } else if (p.body_type === 'lathe') {
    const pts = [];
    const profileSteps = 20;
    const pc = p.profile_center, pw = p.profile_width, pts_scale = p.profile_taper_scale;
    for (let i = 0; i <= profileSteps; i++) {
      const t = i / profileSteps;
      const y = t * BH;
      const bottom = Math.exp(-((t - pc) ** 2) / pw) * BR;
      const taper = BR * pts_scale * (1 - t) * Math.sqrt(Math.max(0, t));
      let r = Math.max(bottom, taper);
      if (t > 0.85) r *= (1 - t) / 0.15;
      if (t < 0.03) r *= t / 0.03;
      pts.push(new THREE.Vector2(Math.max(r, 0), y));
    }
    bodyGeo = new THREE.LatheGeometry(pts, 48);
    body = new THREE.Mesh(bodyGeo, bodyMat);
  } else if (p.body_type === 'tube') {
    const segs = 40;
    const curvePoints = [];
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      curvePoints.push(new THREE.Vector3(Math.sin(t * Math.PI) * p.tube_bend, t * BH, 0));
    }
    const curve = new THREE.CatmullRomCurve3(curvePoints);
    bodyGeo = new THREE.TubeGeometry(curve, 48, BR, 16, false);
    const posAttr = bodyGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
      const x = posAttr.getX(i), y = posAttr.getY(i), z = posAttr.getZ(i);
      const t = Math.max(0, Math.min(1, y / BH));
      const taper = Math.sin(t * Math.PI) * 0.7 + 0.3;
      const pt = curve.getPoint(t);
      const dx = x - pt.x, dz = z - pt.z;
      posAttr.setX(i, pt.x + dx * taper);
      posAttr.setZ(i, pt.z + dz * taper * p.tube_flatten_z);
    }
    bodyGeo.computeVertexNormals();
    body = new THREE.Mesh(bodyGeo, bodyMat);
    // Store curve for bump placement
    p._curve = curve;
    p._curvePoints = curvePoints;
  } else if (p.body_type === 'extrude') {
    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.absarc(0, 0, BR, 0, Math.PI, false);
    shape.lineTo(0, 0);
    bodyGeo = new THREE.ExtrudeGeometry(shape, { depth: p.slice_depth, bevelEnabled: false });
    body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = BR;

    // Rind
    if (p.has_rind) {
      const rindR = BR + p.rind_thickness;
      const rindShape = new THREE.Shape();
      rindShape.moveTo(BR, 0);
      rindShape.absarc(0, 0, rindR, 0, Math.PI, false);
      rindShape.lineTo(-BR, 0);
      rindShape.absarc(0, 0, BR, Math.PI, 0, true);
      const rindGeo = new THREE.ExtrudeGeometry(rindShape, { depth: p.slice_depth, bevelEnabled: false });
      const rind = new THREE.Mesh(rindGeo, leafMat);
      rind.position.y = BR;
      group.add(rind);
    }
  } else if (p.body_type === 'star') {
    const starPts = p.star_points;
    const aSegs = starPts * 8, hSegs = 24;
    const positions = [], normals = [], indices = [];
    function starRadius(angle) {
      const a5 = (angle % (Math.PI * 2 / starPts)) / (Math.PI * 2 / starPts);
      const peak = Math.cos(a5 * Math.PI * 2 - Math.PI) * 0.5 + 0.5;
      return BR * (0.55 + peak * 0.45);
    }
    for (let h = 0; h <= hSegs; h++) {
      const t = h / hSegs, y = t * BH;
      const taper = Math.sin(t * Math.PI) * 0.75 + 0.25;
      for (let a = 0; a <= aSegs; a++) {
        const angle = (a / aSegs) * Math.PI * 2;
        const r = starRadius(angle) * taper;
        positions.push(r * Math.cos(angle), y, r * Math.sin(angle));
        normals.push(Math.cos(angle), 0, Math.sin(angle));
      }
    }
    for (let h = 0; h < hSegs; h++) {
      for (let a = 0; a < aSegs; a++) {
        const i0 = h * (aSegs + 1) + a, i1 = i0 + 1;
        const i2 = i0 + (aSegs + 1), i3 = i2 + 1;
        indices.push(i0, i2, i1, i1, i2, i3);
      }
    }
    bodyGeo = new THREE.BufferGeometry();
    bodyGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    bodyGeo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    bodyGeo.setIndex(indices);
    bodyGeo.computeVertexNormals();
    body = new THREE.Mesh(bodyGeo, bodyMat);
  }

  const bodyOrigPositions = new Float32Array(bodyGeo.attributes.position.array);
  group.add(body);

  // --- Bumps ---
  const bumps = [];

  if (p.bump_placement === 'grid') {
    // Bumps on sphere/lathe surface in a row/col grid
    const bScale = p.bump_scale || [1, 1, 1];
    let bumpGeo;
    if (p.bump_type === 'cone') {
      bumpGeo = new THREE.ConeGeometry(p.cone_radius, p.cone_height, 6);
      bumpGeo.translate(0, p.cone_height / 2, 0);
    } else {
      bumpGeo = new THREE.SphereGeometry(BS, p.bump_type === 'cone' ? 6 : 8, p.bump_type === 'cone' ? 4 : 6);
    }

    // Profile radius function for lathe bodies
    let profileRadius;
    if (p.body_type === 'lathe') {
      const pc = p.profile_center, pw = p.profile_width, pts_scale = p.profile_taper_scale;
      profileRadius = function(yVal) {
        const t = Math.max(0, Math.min(1, yVal / BH));
        const bottom = Math.exp(-((t - pc) ** 2) / pw) * BR;
        const taper = BR * pts_scale * (1 - t) * Math.sqrt(Math.max(0, t));
        let r = Math.max(bottom, taper);
        if (t > 0.85) r *= (1 - t) / 0.15;
        if (t < 0.03) r *= t / 0.03;
        return Math.max(r, 0);
      };
    }

    for (let row = 0; row < BROWS; row++) {
      const rowFrac = (row + 0.5) / BROWS;
      let yPos, localR;

      if (p.body_type === 'lathe') {
        yPos = rowFrac * BH;
        localR = profileRadius(yPos);
        if (localR <= BS * 1.5) continue;
      } else {
        // sphere body
        const zPos = -BH / 2 + rowFrac * BH;
        const zNorm = zPos / (BH / 2);
        localR = BR * Math.sqrt(Math.max(0, 1 - zNorm * zNorm));
        yPos = zPos + BH / 2;
        if (localR <= (p.bump_type === 'cone' ? 4 : BS)) continue;
      }

      for (let col = 0; col < BPROW; col++) {
        const stagger = p.bump_stagger;
        const angleOffset = stagger && (row % 2 === 0) ? 0 : stagger ? (360 / BPROW / 2) : 0;
        const angle = (col * (360 / BPROW) + angleOffset) * Math.PI / 180;
        const bump = new THREE.Mesh(bumpGeo, bumpMat);
        bump.position.set(localR * Math.cos(angle), yPos, localR * Math.sin(angle));
        bump.scale.set(bScale[0], bScale[1], bScale[2]);

        if (p.bump_type === 'cone') {
          // Orient cone outward from body center
          const sx = bump.position.x, sy = bump.position.y - BH / 2, sz = bump.position.z;
          const dir = new THREE.Vector3(sx, sy, sz).normalize();
          bump.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
          // Random scale variation
          if (p.cone_random_scale) bump.scale.set(1, 0.8 + Math.random() * p.cone_random_scale, 1);
        }

        group.add(bump);
        bumps.push({ mesh: bump, origPos: bump.position.clone(), origScale: bump.scale.clone(), row, col, deformOffset: new THREE.Vector3() });
      }
    }
  } else if (p.bump_placement === 'curve') {
    // Bumps along a tube curve
    const bumpGeo = new THREE.SphereGeometry(BS, 6, 4);
    const curve = p._curve;
    for (let row = 0; row < BROWS; row++) {
      const rowT = (row + 0.5) / BROWS;
      const pt = curve.getPoint(rowT);
      const taper = Math.sin(rowT * Math.PI) * 0.7 + 0.3;
      const localR = BR * taper;
      if (localR <= 3) continue;
      for (let col = 0; col < BPROW; col++) {
        const stagger = p.bump_stagger;
        const angleOff = stagger ? (row % 2) * (360 / BPROW / 2) : 0;
        const angle = (col * (360 / BPROW) + angleOff) * Math.PI / 180;
        const bump = new THREE.Mesh(bumpGeo, bumpMat);
        bump.position.set(
          pt.x + Math.cos(angle) * localR,
          pt.y,
          pt.z + Math.sin(angle) * localR * p.tube_flatten_z
        );
        group.add(bump);
        bumps.push({ mesh: bump, origPos: bump.position.clone(), origScale: bump.scale.clone(), row, col, deformOffset: new THREE.Vector3() });
      }
    }
  } else if (p.bump_placement === 'random') {
    // Randomly scattered bumps (e.g. watermelon seeds)
    const bumpGeo = new THREE.SphereGeometry(BS, 6, 4);
    const bScale = p.bump_scale || [1, 1, 1];
    const count = p.bump_count || 20;
    for (let i = 0; i < count; i++) {
      const angle = (0.15 + Math.random() * 0.7) * Math.PI;
      const r = (0.25 + Math.random() * 0.5) * BR;
      const x = r * Math.cos(angle), y = r * Math.sin(angle);
      const bump = new THREE.Mesh(bumpGeo, bumpMat);
      bump.position.set(x, y + BR, -0.5);
      bump.scale.set(bScale[0], bScale[1], bScale[2]);
      bump.rotation.z = angle - Math.PI / 2;
      group.add(bump);
      bumps.push({ mesh: bump, origPos: bump.position.clone(), origScale: bump.scale.clone(), row: Math.floor(i / 4), col: i % 4, deformOffset: new THREE.Vector3() });
    }
  } else if (p.bump_placement === 'ridge') {
    // Bumps at star ridge peaks
    const bumpGeo = new THREE.SphereGeometry(BS, 6, 4);
    const bScale = p.bump_scale || [1, 1, 1];
    const starPts = p.star_points;
    for (let row = 0; row < BROWS; row++) {
      const t = (row + 0.5) / BROWS;
      const y = t * BH;
      const taper = Math.sin(t * Math.PI) * 0.75 + 0.25;
      for (let pt = 0; pt < starPts; pt++) {
        const angle = (pt / starPts) * Math.PI * 2;
        const r = BR * taper;
        const bump = new THREE.Mesh(bumpGeo, bumpMat);
        bump.position.set(r * Math.cos(angle), y, r * Math.sin(angle));
        bump.scale.set(bScale[0], bScale[1], bScale[2]);
        group.add(bump);
        bumps.push({ mesh: bump, origPos: bump.position.clone(), origScale: bump.scale.clone(), row, col: pt, deformOffset: new THREE.Vector3() });
      }
    }
  }

  // --- Base ---
  const baseMat = p.body_type === 'extrude' ? leafMat : bodyMat;
  const base = new THREE.Mesh(new THREE.CylinderGeometry(p.base_r1, p.base_r2, 2, 32), baseMat);
  base.position.y = 1;
  group.add(base);

  // --- Stem ---
  if (p.has_stem) {
    const stemColor = p.stem_color ? parseInt(p.stem_color) : parseInt(p.leaf_color);
    const stemMat = new THREE.MeshStandardMaterial({ color: stemColor, roughness: 0.8, metalness: 0.0 });
    const stemGeo = new THREE.CylinderGeometry(p.stem_r1, p.stem_r2, p.stem_height, 8);
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.y = p.stem_y;
    if (p.stem_tilt) stem.rotation.z = p.stem_tilt;
    group.add(stem);
  }

  // --- Leaves/Crown ---
  const leaves = [];
  const crown = new THREE.Group();
  crown.position.y = p.crown_y;

  if (p.leaf_placement === 'crown') {
    const leafGeo = createLeafGeo(p.leaf_width, p.leaf_thickness, p.leaf_length);
    const rings = p.leaf_rings || [];

    if (p.name === 'banana') {
      // Banana: stem + nub as special leaf items
      const stemGeo = new THREE.CylinderGeometry(p.stem_r1, p.stem_r2, p.stem_height, 8);
      const stem = new THREE.Mesh(stemGeo, leafMat);
      // End-of-curve X offset
      const endX = p._curvePoints ? p._curvePoints[p._curvePoints.length - 1].x - p._curvePoints[0].x : 0;
      stem.position.set(endX, p.stem_height / 2, 0);
      crown.add(stem);
      leaves.push({ mesh: stem, origTiltRad: 0, angleDeg: 0, origScale: stem.scale.clone() });

      if (p.has_nub) {
        const nubGeo = new THREE.SphereGeometry(p.nub_radius, 8, 6);
        const nub = new THREE.Mesh(nubGeo, leafMat);
        nub.position.set(0, -BH, 0);
        crown.add(nub);
        leaves.push({ mesh: nub, origTiltRad: 0, angleDeg: 180, origScale: nub.scale.clone() });
      }
    } else if (p.name === 'durian') {
      // Durian: stem cylinder + leaves positioned above crown
      const stemColor = p.stem_color ? parseInt(p.stem_color) : parseInt(p.leaf_color);
      const stemMtl = new THREE.MeshStandardMaterial({ color: stemColor, roughness: 0.8 });
      const stemGeo = new THREE.CylinderGeometry(p.stem_r1, p.stem_r2, p.stem_height, 8);
      const stem = new THREE.Mesh(stemGeo, stemMtl);
      stem.position.y = p.stem_height / 2;
      crown.add(stem);
      leaves.push({ mesh: stem, origTiltRad: 0, angleDeg: 0, origScale: stem.scale.clone() });

      for (const ring of rings) {
        const [count, startAngle, tiltDeg, sx, sy, sz, yOff] = ring;
        for (let i = 0; i < count; i++) {
          const angleDeg = startAngle + i * (360 / count);
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.rotation.order = 'YXZ';
          leaf.rotation.y = angleDeg * Math.PI / 180;
          leaf.rotation.x = -tiltDeg * Math.PI / 180;
          leaf.position.y = yOff || p.stem_height - 2;
          leaf.scale.set(sx || 1, sy || 1, sz || 1);
          crown.add(leaf);
          leaves.push({ mesh: leaf, origTiltRad: -tiltDeg * Math.PI / 180, angleDeg, origScale: leaf.scale.clone() });
        }
      }
    } else if (p.name === 'starfruit') {
      // Starfruit: stem cylinder + tiny leaf
      const stemGeo = new THREE.CylinderGeometry(p.stem_r1, p.stem_r2, p.stem_height, 8);
      const stem = new THREE.Mesh(stemGeo, leafMat);
      stem.position.y = 2;
      crown.add(stem);
      leaves.push({ mesh: stem, origTiltRad: 0, angleDeg: 0, origScale: stem.scale.clone() });

      for (const ring of rings) {
        const [count, startAngle, tiltDeg, sx, sy, sz] = ring;
        for (let i = 0; i < count; i++) {
          const angleDeg = startAngle + i * (count > 1 ? 360 / count : 0);
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.rotation.order = 'YXZ';
          leaf.rotation.y = angleDeg * Math.PI / 180;
          leaf.rotation.x = -tiltDeg * Math.PI / 180;
          leaf.position.y = 3;
          leaf.scale.set(sx || 1, sy || 1, sz || 1);
          crown.add(leaf);
          leaves.push({ mesh: leaf, origTiltRad: -tiltDeg * Math.PI / 180, angleDeg, origScale: leaf.scale.clone() });
        }
      }
    } else {
      // Standard crown: rings of evenly-spaced leaves at crown origin
      for (const ring of rings) {
        const [count, startAngle, tiltDeg, sx, sy, sz] = ring;
        for (let i = 0; i < count; i++) {
          const angleDeg = startAngle + i * (360 / count);
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.rotation.order = 'YXZ';
          leaf.rotation.y = angleDeg * Math.PI / 180;
          leaf.rotation.x = -tiltDeg * Math.PI / 180;
          leaf.scale.set(sx || 1, sy || 1, sz || 1);
          crown.add(leaf);
          leaves.push({ mesh: leaf, origTiltRad: -tiltDeg * Math.PI / 180, angleDeg, origScale: leaf.scale.clone() });
        }
      }
    }
  } else if (p.leaf_placement === 'surface') {
    // Leaves/scales positioned on body surface (dragonfruit)
    const scaleGeo = createLeafGeo(p.leaf_width, p.leaf_thickness, p.leaf_length);
    const sRows = p.scale_rows, sPRow = p.scales_per_row;
    const baseTilt = p.scale_base_tilt, tiltPerRow = p.scale_tilt_per_row;

    for (let row = 0; row < sRows; row++) {
      const rowFrac = (row + 0.5) / sRows;
      const zPos = -BH / 2 + rowFrac * BH;
      const zNorm = zPos / (BH / 2);
      const localR = BR * Math.sqrt(Math.max(0, 1 - zNorm * zNorm));
      if (localR <= 4) continue;

      for (let col = 0; col < sPRow; col++) {
        const angleOffset = (row % 2 === 0) ? 0 : (360 / sPRow / 2);
        const angleDeg = col * (360 / sPRow) + angleOffset;
        const angleRad = angleDeg * Math.PI / 180;
        const leaf = new THREE.Mesh(scaleGeo, leafMat);
        leaf.position.set(localR * Math.cos(angleRad), zPos, localR * Math.sin(angleRad));
        leaf.rotation.order = 'YXZ';
        leaf.rotation.y = angleRad;
        const tiltDeg = baseTilt + row * tiltPerRow;
        leaf.rotation.x = -tiltDeg * Math.PI / 180;
        const sy = p.scale_sy_min + rowFrac * (p.scale_sy_max - p.scale_sy_min);
        leaf.scale.set(p.scale_sx, sy, p.scale_sz);
        crown.add(leaf);
        leaves.push({ mesh: leaf, origTiltRad: -tiltDeg * Math.PI / 180, angleDeg, origScale: leaf.scale.clone() });
      }
    }

    // Top tuft
    if (p.tuft_count) {
      const ts = p.tuft_scale;
      for (let i = 0; i < p.tuft_count; i++) {
        const angleDeg = i * (360 / p.tuft_count);
        const leaf = new THREE.Mesh(scaleGeo, leafMat);
        leaf.position.set(0, BH / 2 + p.tuft_y_offset, 0);
        leaf.rotation.order = 'YXZ';
        leaf.rotation.y = angleDeg * Math.PI / 180;
        leaf.rotation.x = -p.tuft_tilt * Math.PI / 180;
        leaf.scale.set(ts[0], ts[1], ts[2]);
        crown.add(leaf);
        leaves.push({ mesh: leaf, origTiltRad: -p.tuft_tilt * Math.PI / 180, angleDeg, origScale: leaf.scale.clone() });
      }
    }
  }

  group.add(crown);

  // Display height for watermelon is BR * 2
  const displayBH = p.body_type === 'extrude' ? BR * 2 : BH;
  const displayCrownY = p.body_type === 'extrude' ? BR * 2 : p.crown_y;

  return {
    name: p.name, group, body, bodyGeo, bodyOrigPositions,
    bodyHeight: displayBH, bodyRadius: BR,
    defaultCrownY: displayCrownY, defaultBodyScaleY: defaultBodyScaleY,
    bumps, leaves, crown,
    materials: { body: bodyMat, bump: bumpMat, leaf: leafMat },
    origColors: { body: new THREE.Color(parseInt(p.body_color)), bump: new THREE.Color(parseInt(p.bump_color)), leaf: new THREE.Color(parseInt(p.leaf_color)) },
    // Metadata for SCAD export dispatch
    bumpType: p.bump_type, bumpPlacement: p.bump_placement, leafPlacement: p.leaf_placement,
    params: p
  };
}

// =====================================================
// DEFORMATION TOOLS
// =====================================================
let activeTool = null;
const toolBtns = { toolGrab: 'grab', toolInflate: 'inflate', toolPinch: 'pinch', toolSpike: 'spike' };

for (const [id, tool] of Object.entries(toolBtns)) {
  document.getElementById(id).addEventListener('click', () => {
    if (activeTool === tool) {
      activeTool = null;
      document.getElementById(id).classList.remove('active');
      orbitControls.enabled = true;
    } else {
      if (activeTool) for (const tid of Object.keys(toolBtns)) document.getElementById(tid).classList.remove('active');
      activeTool = tool;
      document.getElementById(id).classList.add('active');
    }
  });
}

addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && activeTool) {
    activeTool = null;
    for (const tid of Object.keys(toolBtns)) document.getElementById(tid).classList.remove('active');
    orbitControls.enabled = true;
  }
});

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let grabbedBump = null;
let dragPlane = new THREE.Plane();
let dragOffset = new THREE.Vector3();

function getBrushRadius() { return Number(document.getElementById('brushRadius').value); }
function screenToMouse(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
}

function findClosestBump(point) {
  let closest = null, minDist = Infinity;
  for (const b of activeModel.bumps) {
    const wp = new THREE.Vector3();
    b.mesh.getWorldPosition(wp);
    const d = wp.distanceTo(point);
    if (d < minDist) { minDist = d; closest = b; }
  }
  return closest;
}

function applyAreaEffect(centerWorld, tool) {
  const radius = getBrushRadius();
  const bodyCenter = new THREE.Vector3(0, activeModel.bodyHeight / 2, 0);
  activeModel.group.localToWorld(bodyCenter);
  for (const b of activeModel.bumps) {
    const wp = new THREE.Vector3();
    b.mesh.getWorldPosition(wp);
    const dist = wp.distanceTo(centerWorld);
    if (dist > radius) continue;
    const falloff = 1 - dist / radius;
    const strength = falloff * falloff * 2;
    const radial = wp.clone().sub(bodyCenter).normalize();
    if (tool === 'inflate') b.deformOffset.add(radial.multiplyScalar(strength));
    else if (tool === 'pinch') b.deformOffset.add(radial.multiplyScalar(-strength));
  }
}

renderer.domElement.addEventListener('mousedown', (e) => {
  if (!activeTool || e.target !== renderer.domElement) return;
  screenToMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const meshes = activeModel.bumps.map(b => b.mesh);
  meshes.push(activeModel.body);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length === 0) return;
  const hitPoint = hits[0].point;

  if (activeTool === 'grab') {
    orbitControls.enabled = false;
    isDragging = true;
    grabbedBump = findClosestBump(hitPoint);
    const camDir = camera.getWorldDirection(new THREE.Vector3());
    dragPlane.setFromNormalAndCoplanarPoint(camDir, hitPoint);
    const intersect = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, intersect);
    const wp = new THREE.Vector3();
    grabbedBump.mesh.getWorldPosition(wp);
    dragOffset.copy(wp).sub(intersect);
  } else if (activeTool === 'inflate' || activeTool === 'pinch') {
    orbitControls.enabled = false;
    isDragging = true;
    applyAreaEffect(hitPoint, activeTool);
  } else if (activeTool === 'spike') {
    const closest = findClosestBump(hitPoint);
    if (closest) {
      const bc = new THREE.Vector3(0, activeModel.bodyHeight / 2, 0);
      const radial = closest.origPos.clone().add(closest.deformOffset).sub(bc).normalize();
      closest.deformOffset.add(radial.multiplyScalar(8));
    }
  }
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging || !activeTool) return;
  screenToMouse(e);
  raycaster.setFromCamera(mouse, camera);
  if (activeTool === 'grab' && grabbedBump) {
    const intersect = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, intersect);
    if (intersect) {
      intersect.add(dragOffset);
      const local = activeModel.group.worldToLocal(intersect);
      grabbedBump.deformOffset.copy(local.sub(grabbedBump.origPos));
    }
  } else if (activeTool === 'inflate' || activeTool === 'pinch') {
    const meshes = activeModel.bumps.map(b => b.mesh);
    meshes.push(activeModel.body);
    const hits = raycaster.intersectObjects(meshes, false);
    if (hits.length > 0) applyAreaEffect(hits[0].point, activeTool);
  }
});

addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; grabbedBump = null; if (activeTool) orbitControls.enabled = false; }
});

// =====================================================
// SCAD EXPORT
// =====================================================
document.getElementById('exportBtn').addEventListener('click', () => {
  const m = activeModel;
  const BH = m.bodyHeight, BR = m.bodyRadius;
  const ex = state.extrude, sq = state.squeeze, rl = state.roll, sm = state.smush;
  const extS = 1 + ex / 100, sqS = 1 - sq * 0.6 / 100;
  const smY = 1 - sm * 0.7 / 100, smXZ = 1 + sm * 0.4 / 100;
  const scaleX = sqS * smXZ, scaleY = extS * smY, scaleZ = sqS * smXZ;
  const rollDeg = (rl / 100) * 180;

  let scad = `// Exported ${m.name} - generated by Pineapple Party\n`;
  const sliderStr = Object.entries(state).map(([k, v]) => `${k}=${v}`).join(', ');
  scad += `// Sliders: ${sliderStr}\n`;
  scad += `// Time: ${animTime.toFixed(2)}s\n\n$fn = 64;\n\n`;
  scad += `rotate([0, 0, ${rollDeg.toFixed(2)}])\nscale([${scaleX.toFixed(4)}, ${scaleY.toFixed(4)}, ${scaleZ.toFixed(4)}]) {\n`;

  // --- Helper: color as SCAD RGB from Three.js hex ---
  function scadColor(hex) {
    const r = ((hex >> 16) & 0xff) / 255;
    const g = ((hex >> 8) & 0xff) / 255;
    const b = (hex & 0xff) / 255;
    return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
  }

  // --- Body: export current mesh as polyhedron (captures all deformations) ---
  // OpenSCAD uses Z-up, Three.js uses Y-up. Map: SCAD x=Three x, SCAD y=Three z, SCAD z=Three y
  const bodyColor = scadColor(m.origColors.body.getHex());
  const posArr = m.bodyGeo.attributes.position.array;
  const idxArr = m.bodyGeo.index ? m.bodyGeo.index.array : null;
  const numVerts = posArr.length / 3;

  scad += `  // Body (${numVerts} vertices)\n  color(${bodyColor})\n  polyhedron(\n    points=[\n`;
  for (let i = 0; i < posArr.length; i += 3) {
    const comma = (i + 3 < posArr.length) ? ',' : '';
    // Swap Y/Z for SCAD Z-up
    scad += `      [${posArr[i].toFixed(3)}, ${posArr[i+2].toFixed(3)}, ${posArr[i+1].toFixed(3)}]${comma}\n`;
  }
  // Reverse face winding: swapping Y/Z flips handedness, so reverse triangle order
  scad += `    ],\n    faces=[\n`;
  if (idxArr) {
    for (let i = 0; i < idxArr.length; i += 3) {
      const comma = (i + 3 < idxArr.length) ? ',' : '';
      scad += `      [${idxArr[i]}, ${idxArr[i+2]}, ${idxArr[i+1]}]${comma}\n`;
    }
  } else {
    for (let i = 0; i < numVerts; i += 3) {
      const comma = (i + 3 < numVerts) ? ',' : '';
      scad += `      [${i}, ${i+2}, ${i+1}]${comma}\n`;
    }
  }
  scad += `    ]\n  );\n\n`;

  // Watermelon rind (extra body part)
  if (m.params && m.params.has_rind) {
    const leafColor = scadColor(m.origColors.leaf.getHex());
    const rindTh = m.params.rind_thickness || 3;
    scad += `  // Rind\n  color(${leafColor})\n  translate([0, 0, ${BR}])\n  linear_extrude(height = ${m.params.slice_depth || 12})\n`;
    scad += `  difference() {\n    difference() { circle(r = ${BR + rindTh}, $fn = 64); circle(r = ${BR}, $fn = 64); }\n`;
    scad += `    translate([0, -${BR + rindTh}, 0]) square(${(BR + rindTh) * 2}, center = true);\n  }\n\n`;
  }

  // Starfruit needs the star module
  if (m.params && m.params.body_type === 'star') {
    scad = scad.replace('$fn = 64;\n\n', '$fn = 64;\n\nmodule star(outer, inner, n) {\n  polygon([for (i = [0:2*n-1]) let(r = i % 2 == 0 ? outer : inner, a = i * 180/n) [r*cos(a), r*sin(a)]]);\n}\n\n');
  }

  // --- Bumps: read actual rendered positions & scales (captures all slider + deform effects) ---
  const bumpColor = scadColor(m.origColors.bump.getHex());

  scad += `  // Bumps\n`;
  for (const b of m.bumps) {
    // Use actual mesh position (includes deformOffset + wobble + melt + gravity + invert)
    const px = b.mesh.position.x;
    const py = b.mesh.position.y;
    const pz = b.mesh.position.z;
    // Actual mesh scale (includes growth + melt effects)
    const sx = b.mesh.scale.x, sy = b.mesh.scale.y, sz = b.mesh.scale.z;
    // SCAD coords: swap Y/Z
    const sp = `[${px.toFixed(3)}, ${pz.toFixed(3)}, ${py.toFixed(3)}]`;

    if (m.bumpType === 'cone') {
      // Conical spikes oriented outward from body center
      // Direction in SCAD coords (Z-up): dx=Three.x, dy=Three.z, dz=Three.y-BH/2
      const dx_s = px, dy_s = pz, dz_s = py - BH / 2;
      const dlen = Math.sqrt(dx_s * dx_s + dy_s * dy_s + dz_s * dz_s) || 1;
      const ndx = dx_s / dlen, ndy = dy_s / dlen, ndz = dz_s / dlen;
      // Rotate cone from default Z-up to direction: angle-axis from cross product
      const angle = Math.acos(Math.max(-1, Math.min(1, ndz))) * 180 / Math.PI;
      // Cross product of (0,0,1) x (ndx,ndy,ndz) = (-ndy, ndx, 0)
      const cx = -ndy, cy = ndx;
      const clen = Math.sqrt(cx * cx + cy * cy);
      const coneH = m.params ? m.params.cone_height : 8;
      const coneR = m.params ? m.params.cone_radius : 2.5;
      const spikeH = (coneH * sy).toFixed(2);
      const spikeR = (coneR * sx).toFixed(2);
      if (clen > 0.001) {
        scad += `  color(${bumpColor}) translate(${sp}) rotate(a = ${angle.toFixed(1)}, v = [${(cx / clen).toFixed(4)}, ${(cy / clen).toFixed(4)}, 0]) cylinder(h = ${spikeH}, r1 = ${spikeR}, r2 = 0, $fn = 6);\n`;
      } else {
        scad += `  color(${bumpColor}) translate(${sp}) cylinder(h = ${spikeH}, r1 = ${spikeR}, r2 = 0, $fn = 6);\n`;
      }
    } else if (m.bumpType === 'seed') {
      scad += `  color("Black") translate(${sp}) scale([${(sx * 0.7).toFixed(3)}, ${(sz * 0.4).toFixed(3)}, ${(sy * 1.2).toFixed(3)}]) sphere(r = ${m.params ? m.params.bump_size : 1.2}, $fn = 8);\n`;
    } else {
      // sphere bumps
      const bsz = m.params ? m.params.bump_size : 1.8;
      scad += `  color(${bumpColor}) translate(${sp}) scale([${sx.toFixed(3)}, ${sz.toFixed(3)}, ${sy.toFixed(3)}]) sphere(r = ${bsz}, $fn = 12);\n`;
    }
  }

  // --- Leaves/crown: read actual rendered state ---
  const leafColor = m.leaves.length > 0 ? scadColor(m.origColors.leaf.getHex()) : null;
  // Crown Z position in SCAD (swap Y→Z from Three.js crown.position.y)
  const crownZ = m.crown ? m.crown.position.y : BH - 3;

  if (m.leaves.length > 0 && leafColor) {
    scad += `\n  // Leaves\n`;

    // Export stem if present
    if (m.params && m.params.has_stem) {
      const stemColor = m.params.stem_color ? scadColor(parseInt(m.params.stem_color).toString(16).padStart(6, '0').replace(/^/, '0x') | 0) : leafColor;
      const stemR1 = m.params.stem_r1, stemR2 = m.params.stem_r2, stemH = m.params.stem_height;
      const stemZ = m.params.stem_y || crownZ;
      scad += `  color(${leafColor}) translate([0, 0, ${stemZ.toFixed ? stemZ.toFixed(1) : stemZ}]) cylinder(h = ${stemH}, r1 = ${stemR2}, r2 = ${stemR1}, $fn = 12);\n`;
    }

    for (const lf of m.leaves) {
      // Skip stem/nub meshes (they don't have real leaf geometry)
      if (lf.origTiltRad === 0 && lf.angleDeg === 0) continue;
      if (lf.angleDeg === 180 && lf.origTiltRad === 0) continue;

      const a = lf.angleDeg;
      // Use current mesh rotation (captures splay + melt effects)
      const tilt = (-lf.mesh.rotation.x * 180 / Math.PI);
      const lsx = lf.mesh.scale.x, lsy = lf.mesh.scale.y, lsz = lf.mesh.scale.z;

      // Position: for surface-placed leaves, include their local position
      if (m.leafPlacement === 'surface') {
        const lpx = lf.mesh.position.x, lpy = lf.mesh.position.y, lpz = lf.mesh.position.z;
        scad += `  color(${leafColor}) translate([${lpx.toFixed(3)}, ${lpz.toFixed(3)}, ${(lpy + crownZ).toFixed(3)}])\n`;
      } else {
        scad += `  color(${leafColor}) translate([0, 0, ${crownZ.toFixed(1)}])\n`;
      }
      scad += `  rotate([0, 0, ${a.toFixed(1)}]) rotate([${tilt.toFixed(1)}, 0, 0])\n`;
      scad += `    scale([${lsx.toFixed(3)}, ${lsz.toFixed(3)}, ${lsy.toFixed(3)}])\n`;

      const lw = m.params ? m.params.leaf_width : 8;
      const ll = m.params ? m.params.leaf_length : 20;
      scad += `    hull() {\n      scale([${(lw / 2).toFixed(1)}, 1, 1]) sphere(r = 1, $fn = 8);\n`;
      scad += `      translate([0, -${(ll * 0.25).toFixed(1)}, ${(ll * 0.5).toFixed(1)}]) scale([${(lw / 5).toFixed(1)}, 0.5, 1]) sphere(r = 0.8, $fn = 8);\n    }\n`;
    }
  }

  const baseR1 = m.params ? m.params.base_r1 : 10;
  const baseR2 = m.params ? m.params.base_r2 : 12;
  scad += `}\n\n// Base\ncylinder(h = 2, r1 = ${baseR2}, r2 = ${baseR1}, $fn = 32);\n`;

  const blob = new Blob([scad], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = m.name + '_export.scad'; a.click();
  URL.revokeObjectURL(url);
});

// =====================================================
// ANIMATION LOOP
// =====================================================
let lastFrameTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;

  if (playing && !scrubbing) {
    animTime += dt * playbackSpeed;
    if (animTime < 0) animTime += MAX_TIME;
    if (animTime > MAX_TIME) animTime -= MAX_TIME;
  }
  if (!scrubbing) scrubEl.value = Math.round(animTime * 100);
  timeDisp.textContent = animTime.toFixed(2) + 's';

  const t = animTime;
  const m = activeModel;
  const BH = m.bodyHeight, BR = m.bodyRadius;

  // --- Static transforms ---
  const extrudeScale = 1 + state.extrude / 100;
  const squeezeScale = 1 - state.squeeze * 0.6 / 100;
  const smushY = 1 - state.smush * 0.7 / 100;
  const smushXZ = 1 + state.smush * 0.4 / 100;

  m.group.rotation.z = state.roll * Math.PI / 100;

  // Throb
  const th = state.throb / 100;
  const throbPulse = th > 0 ? 1 + Math.sin(t * 3) * th * 0.25 : 1;
  const throbPulseY = th > 0 ? 1 + Math.sin(t * 3 + 0.5) * th * 0.15 : 1;

  m.group.scale.set(
    squeezeScale * smushXZ * throbPulse,
    extrudeScale * smushY * throbPulseY,
    squeezeScale * smushXZ * throbPulse
  );

  const wb = state.wibble / 100;
  const ml = state.melt / 100;
  const g = state.galumph / 100;
  const inv = state.invert / 100;

  // Galumph
  if (g > 0) {
    m.group.rotation.x = Math.sin(t * 3.5) * g * 0.3;
    m.group.rotation.z = state.roll * Math.PI / 100 + Math.cos(t * 2.7) * g * 0.25;
    m.group.position.y = Math.abs(Math.sin(t * 4.2)) * g * 8;
  } else {
    m.group.rotation.x = 0;
    m.group.position.y = 0;
  }

  // --- Invert: body mesh vertex manipulation ---
  if (inv > 0) {
    const posAttr = m.bodyGeo.attributes.position;
    const arr = posAttr.array;
    for (let i = 0; i < arr.length; i += 3) {
      const ox = m.bodyOrigPositions[i], oy = m.bodyOrigPositions[i+1], oz = m.bodyOrigPositions[i+2];
      const factor = inv <= 0.5 ? 1 - inv * 2 : (inv - 0.5) * 2 - 1;
      arr[i] = ox * factor; arr[i+1] = oy * factor; arr[i+2] = oz * factor;
    }
    posAttr.needsUpdate = true;
    m.bodyGeo.computeVertexNormals();
    m.materials.body.side = inv > 0.5 ? THREE.BackSide : THREE.FrontSide;
  } else {
    const posAttr = m.bodyGeo.attributes.position;
    posAttr.array.set(m.bodyOrigPositions);
    posAttr.needsUpdate = true;
    m.materials.body.side = THREE.FrontSide;
  }

  // --- Update bumps ---
  const bodyCenter = new THREE.Vector3(0, BH / 2, 0);
  for (const b of m.bumps) {
    let sx = b.origScale.x, sy = b.origScale.y, sz = b.origScale.z;
    let px = b.origPos.x + b.deformOffset.x;
    let py = b.origPos.y + b.deformOffset.y;
    let pz = b.origPos.z + b.deformOffset.z;

    if (g > 0) {
      const phase = b.row * 0.8 + b.col * 0.3;
      const pulse = 1 + Math.sin(t * 5 + phase) * g * 0.3;
      sx *= pulse; sy *= pulse; sz *= pulse;
    }
    if (wb > 0) {
      const wavePhase = b.origPos.y * 0.12 - t * 4;
      const waveAmt = Math.sin(wavePhase) * wb * 5;
      const dist = Math.sqrt(b.origPos.x ** 2 + b.origPos.z ** 2);
      if (dist > 0.01) { px += (b.origPos.x / dist) * waveAmt; pz += (b.origPos.z / dist) * waveAmt; }
    }
    if (ml > 0) {
      const hf = b.origPos.y / BH;
      py -= hf * hf * ml * 30;
      const spread = 1 + hf * ml * 0.4;
      px = b.origPos.x * spread + (px - b.origPos.x);
      pz = b.origPos.z * spread + (pz - b.origPos.z);
      sy *= 1 - hf * ml * 0.5; sx *= 1 + hf * ml * 0.3; sz *= 1 + hf * ml * 0.3;
    }
    if (inv > 0) {
      const factor = inv <= 0.5 ? 1 - inv * 2 : (inv - 0.5) * 2 - 1;
      px = bodyCenter.x + (px - bodyCenter.x) * factor;
      py = bodyCenter.y + (py - bodyCenter.y) * factor;
      pz = bodyCenter.z + (pz - bodyCenter.z) * factor;
    }
    b.mesh.scale.set(sx, sy, sz);
    b.mesh.position.set(px, py, pz);
  }

  // --- Leaves: splay + melt + invert ---
  const sp = state.splay / 100;
  for (let i = 0; i < m.leaves.length; i++) {
    const lf = m.leaves[i];
    const flutter = sp > 0 ? Math.sin(t * 4 + i * 1.1) * sp * 0.08 : 0;
    const extraTilt = sp * 0.8 + flutter;
    let tiltX = lf.origTiltRad - extraTilt;
    if (ml > 0) {
      tiltX += ml * 1.2;
      lf.mesh.scale.set(lf.origScale.x * (1 + ml * 0.2), lf.origScale.y * (1 - ml * 0.3), lf.origScale.z * (1 + ml * 0.2));
    } else { lf.mesh.scale.copy(lf.origScale); }
    if (inv > 0) {
      const flipFactor = inv <= 0.5 ? 1 - inv * 2 : (inv - 0.5) * 2 - 1;
      tiltX = tiltX * flipFactor;
    }
    lf.mesh.rotation.x = tiltX;
  }

  // Melt body - determine default body scale and crown Y per model
  const defaultBodyScaleY = m.defaultBodyScaleY;
  const defaultCrownY = m.defaultCrownY;

  if (ml > 0) {
    m.body.scale.set(1 + ml * 0.3, defaultBodyScaleY * (1 - ml * 0.4), 1 + ml * 0.3);
    m.crown.position.y = defaultCrownY * (1 - ml * 0.35);
  } else {
    m.body.scale.set(1, defaultBodyScaleY, 1);
    m.crown.position.y = defaultCrownY;
  }

  // Invert: crown position
  if (inv > 0) {
    const factor = inv <= 0.5 ? 1 - inv * 2 : (inv - 0.5) * 2 - 1;
    const crownBase = m.crown.position.y;
    const crownRel = crownBase - BH / 2;
    m.crown.position.y = BH / 2 + crownRel * factor;
  }

  // --- Sulpherate ---
  const s = state.sulpherate / 100;
  m.materials.body.color.copy(m.origColors.body).lerp(sulphurColor, s);
  m.materials.bump.color.copy(m.origColors.bump).lerp(sulphurColor, s);
  m.materials.leaf.color.copy(m.origColors.leaf).lerp(sulphurColor, s * 0.7);
  m.materials.body.emissive.setHex(0xeeee00).multiplyScalar(s * 0.3);
  m.materials.bump.emissive.setHex(0xeeee00).multiplyScalar(s * 0.3);
  m.materials.leaf.emissive.setHex(0xaaaa00).multiplyScalar(s * 0.2);

  // --- Disco ---
  const d = state.disco / 100;
  if (d > 0) {
    const hue = (t * 0.5) % 1;
    discoLight.color.setHSL(hue, 1, 0.5);
    discoLight.intensity = d * 3;
    discoLight.position.set(Math.cos(t * 2) * 60, 40 + Math.sin(t * 1.3) * 20, Math.sin(t * 2) * 60);
    const dc1 = new THREE.Color().setHSL(hue, 1, 0.3).multiplyScalar(d);
    const dc2 = new THREE.Color().setHSL((t * 0.8 + 0.33) % 1, 1, 0.3).multiplyScalar(d);
    const dc3 = new THREE.Color().setHSL((t * 0.6 + 0.66) % 1, 1, 0.3).multiplyScalar(d);
    m.materials.body.emissive.add(dc1);
    m.materials.bump.emissive.add(dc2);
    m.materials.leaf.emissive.add(dc3);
    scene.background.setHSL((t * 0.3) % 1, 0.3, 0.05 + d * 0.05);
    if (d > 0.5 && Math.sin(t * 12) > 0.9) { scene.background.setHex(0x222233); ambientLight.intensity = 2; }
    else { ambientLight.intensity = 0.5; }
    gridHelper.material.color.setHSL(hue, 0.8, 0.3);
  } else {
    discoLight.intensity = 0;
    scene.background.copy(bgColor);
    ambientLight.intensity = 0.5;
    gridHelper.material.color.setHex(0x333355);
  }

  orbitControls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
